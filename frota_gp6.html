<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Frota Global - Global Premier</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F1F5F9;color:#0F172A;font-size:14px;min-height:100vh;}

/* LOGIN */
#pg-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1E3A6E,#2563EB);padding:16px;}
.lbox{background:#fff;padding:28px 24px;border-radius:12px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.llogo{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#94A3B8;margin-bottom:4px;}
.ltitle{font-size:22px;font-weight:800;color:#1E3A6E;margin-bottom:2px;}
.lsub{font-size:12px;color:#64748B;margin-bottom:20px;}
.ll{display:block;font-size:10px;font-weight:700;color:#64748B;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.li{width:100%;padding:11px 14px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:15px;margin-bottom:12px;outline:none;background:#F8FAFC;}
.li:focus{border-color:#2563EB;background:#fff;}
.lb{width:100%;background:#1E3A6E;color:#fff;border:none;padding:13px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.5px;}
.lb:hover{background:#2563EB;}
.lerr{color:#DC2626;font-size:12px;margin-top:6px;min-height:16px;}
.linfo{margin-top:14px;padding:10px;background:#F1F5F9;border-radius:8px;font-size:11px;color:#64748B;text-align:center;line-height:1.9;}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh;}
header{background:#FFCD11;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.hlogo{font-size:15px;font-weight:800;color:#1A1A1A;letter-spacing:.5px;}
.hmod{font-size:11px;color:#333;}
.hright{display:flex;align-items:center;gap:8px;}
.hpill{background:rgba(0,0,0,.12);color:#1A1A1A;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;text-transform:uppercase;}
.hbtn{background:rgba(0,0,0,.1);border:1px solid rgba(0,0,0,.2);color:#1A1A1A;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;border-radius:6px;}

/* BOTTOM NAV */
.bnav{background:#fff;border-bottom:2px solid #E2E8F0;display:flex;z-index:49;box-shadow:0 2px 6px rgba(0,0,0,.08);flex-shrink:0;}
.bni{flex:1;padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:transparent;color:#94A3B8;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;transition:all .2s;border-bottom:3px solid transparent;}
.bni.on{color:#1A1A1A;border-bottom-color:#FFCD11;}
.bni svg{width:20px;height:20px;}
.bni-dot{width:5px;height:5px;border-radius:50%;background:#DC2626;margin-top:1px;display:none;}
.bni-dot.show{display:block;}

/* PAGES */
.page{display:none;padding:16px;padding-bottom:16px;}
.page.on{display:block;}
.ptitle{font-size:18px;font-weight:800;color:#1E3A6E;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}

/* CARDS */
.card{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #E2E8F0;}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.card-title{font-size:15px;font-weight:800;color:#1E3A6E;}
.card-sub{font-size:11px;color:#64748B;margin-top:1px;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.badge-ok{background:#DCFCE7;color:#16A34A;}
.badge-warn{background:#FEF9C3;color:#854D0E;}
.badge-crit{background:#FEE2E2;color:#DC2626;}
.badge-blue{background:#DBEAFE;color:#1E3A6E;}
.badge-gray{background:#F1F5F9;color:#475569;}

/* GRID INFO */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
.info-item{background:#F8FAFC;border-radius:6px;padding:7px 10px;}
.info-lbl{font-size:9px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;}
.info-val{font-size:13px;font-weight:700;color:#0F172A;margin-top:1px;}

/* ALERTAS */
.alerta{border-left:4px solid;padding:10px 12px;border-radius:0 8px 8px 0;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;}
.alerta-crit{background:#FEF2F2;border-color:#DC2626;}
.alerta-warn{background:#FFFBEB;border-color:#F59E0B;}
.alerta-ok{background:#F0FDF4;border-color:#16A34A;}
.alerta-icon{font-size:18px;flex-shrink:0;}
.alerta-txt{flex:1;}
.alerta-nm{font-size:13px;font-weight:700;color:#0F172A;}
.alerta-sub{font-size:11px;color:#64748B;margin-top:2px;}

/* FORMULARIOS */
.form-group{margin-bottom:12px;}
.flbl{display:block;font-size:11px;font-weight:700;color:#64748B;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;}
.finput,.fsel,.ftarea{width:100%;padding:11px 14px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:14px;outline:none;background:#fff;-webkit-appearance:none;}
.finput:focus,.fsel:focus,.ftarea:focus{border-color:#2563EB;}
.ftarea{min-height:80px;resize:vertical;font-family:inherit;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* BOTOES */
.btn{padding:11px 18px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;letter-spacing:.3px;transition:all .2s;}
.btn-p{background:#1E3A6E;color:#fff;width:100%;justify-content:center;}
.btn-p:hover{background:#2563EB;}
.btn-s{background:#16A34A;color:#fff;width:100%;justify-content:center;}
.btn-s:hover{background:#15803D;}
.btn-d{background:#FEE2E2;color:#DC2626;border:1px solid #FECACA;}
.btn-d:hover{background:#DC2626;color:#fff;}
.btn-g{background:#F1F5F9;color:#475569;border:1px solid #E2E8F0;}
.btn-g:hover{background:#E2E8F0;}
.btn-sm{padding:6px 12px;font-size:11px;}
.btn-row{display:flex;gap:8px;margin-top:4px;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:14px;}
.search-inp{width:100%;padding:11px 14px 11px 38px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:14px;outline:none;background:#fff;}
.search-inp:focus{border-color:#2563EB;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94A3B8;font-size:16px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.on{display:flex;}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:20px 16px 32px;}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-size:17px;font-weight:800;color:#1E3A6E;}
.modal-x{background:#F1F5F9;border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:#64748B;}

/* TIPO ICON */
.tipo-icon{font-size:24px;margin-right:10px;}

/* PROGRESS BAR */
.prog-wrap{margin-top:8px;}
.prog-lbl{display:flex;justify-content:space-between;font-size:10px;color:#64748B;margin-bottom:4px;}
.prog-bar{background:#E2E8F0;height:6px;border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width .4s;}

/* TABS */
.tabs{display:flex;background:#F1F5F9;border-radius:8px;padding:3px;margin-bottom:14px;}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:700;color:#64748B;cursor:pointer;border-radius:6px;transition:all .2s;}
.tab.on{background:#fff;color:#1E3A6E;box-shadow:0 1px 3px rgba(0,0,0,.1);}

/* HISTORICO ITEM */
.hist-item{padding:12px;border-bottom:1px solid #F1F5F9;}
.hist-item:last-child{border-bottom:none;}
.hist-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.hist-nm{font-size:13px;font-weight:700;}
.hist-data{font-size:10px;color:#94A3B8;}
.hist-det{font-size:11px;color:#64748B;margin-top:2px;}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:#94A3B8;}
.empty-icon{font-size:48px;margin-bottom:10px;}
.empty-txt{font-size:14px;font-weight:600;}
.empty-sub{font-size:12px;margin-top:4px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
.stat{background:#fff;border-radius:10px;padding:14px;text-align:center;border:1px solid #E2E8F0;}
.stat-val{font-size:26px;font-weight:800;color:#1E3A6E;}
.stat-lbl{font-size:10px;color:#64748B;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

@media(min-width:600px){
  .form-row{grid-template-columns:repeat(3,1fr);}
  .stats-grid{grid-template-columns:repeat(4,1fr);}
  .page{max-width:700px;margin:0 auto;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="pg-login">
  <div class="lbox">
    <div class="llogo">Global Premier Construtora</div>
    <div class="ltitle">Frota Global</div>
    <div class="lsub">Controle de manutenção e reparos</div>
    <label class="ll">Usuário</label>
    <input class="li" id="l-u" type="text" placeholder="seu.usuario" autocomplete="off">
    <label class="ll">Senha</label>
    <input class="li" id="l-p" type="password" placeholder="senha">
    <button class="lb" onclick="doLogin()">Entrar</button>
    <div class="lerr" id="l-err"></div>
    <div class="linfo">admin/1234 &nbsp;·&nbsp; motorista/1234</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div>
      <div class="hlogo">Frota Global</div>
      <div class="hmod">Global Premier</div>
    </div>
    <div class="hright">
      <span class="hpill" id="h-perf"></span>
      <span class="hpill" id="h-usr"></span>
      <button class="hbtn" onclick="doLogout()">Sair</button>
    </div>
  </header>

  <!-- NAV SUPERIOR -->
  <div class="bnav" id="bnav">
    <button class="bni on" data-pg="home" onclick="goTab('home',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Início
      <div class="bni-dot" id="dot-home"></div>
    </button>
    <button class="bni" data-pg="frota" onclick="goTab('frota',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      Frota
    </button>
    <button class="bni" data-pg="manut" onclick="goTab('manut',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      Manutencao
    </button>
    <button class="bni" data-pg="admin" id="tab-admin" onclick="goTab('admin',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Relatorios
    </button>
  </div>

  <!-- DASHBOARD -->
  <div class="page on" id="pg-home">
    <div class="ptitle">Dashboard</div>
    <div class="stats-grid" id="stats"></div>
    <div style="font-size:12px;font-weight:700;color:#DC2626;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">&#9888; Alertas de Revisão</div>
    <div id="alertas-list"></div>
  </div>

  <!-- FROTA -->
  <div class="page" id="pg-frota">
    <div class="ptitle">
      Frota
      <button class="btn btn-p btn-sm" id="btn-add-maq" onclick="abrirModalMaq()" style="display:none;">+ Máquina</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input class="search-inp" id="busca" type="text" placeholder="Buscar por placa, modelo, marca..." oninput="renderFrota()">
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;">
      <button class="btn btn-g btn-sm filtro-tipo on" data-tipo="" onclick="setFiltroTipo(this,'')">Todos</button>
      <button class="btn btn-g btn-sm filtro-tipo" data-tipo="retroescavadeira" onclick="setFiltroTipo(this,'retroescavadeira')">&#9968; Retro</button>
      <button class="btn btn-g btn-sm filtro-tipo" data-tipo="caminhao" onclick="setFiltroTipo(this,'caminhao')">&#128666; Caminhão</button>
      <button class="btn btn-g btn-sm filtro-tipo" data-tipo="manipuladora" onclick="setFiltroTipo(this,'manipuladora')">&#127959; Manipul.</button>
      <button class="btn btn-g btn-sm filtro-tipo" data-tipo="camionete" onclick="setFiltroTipo(this,'camionete')">&#128665; Camionete</button>
      <button class="btn btn-g btn-sm filtro-tipo" data-tipo="carro" onclick="setFiltroTipo(this,'carro')">&#128664; Carro</button>
    </div>
    <div id="frota-list"></div>
  </div>

  <!-- MANUTENCAO -->
  <div class="page" id="pg-manut">
    <div class="ptitle">Manutenção</div>
    <div class="tabs">
      <div class="tab on" onclick="setTabManut('registrar',this)">Registrar</div>
      <div class="tab" onclick="setTabManut('historico',this)">Histórico</div>
    </div>
    <div id="manut-registrar">
      <div class="card">
        <div class="form-group">
          <label class="flbl">Máquina / Veículo</label>
          <select class="fsel" id="m-maq">
            <option value="">Selecione...</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="flbl">Tipo</label>
            <select class="fsel" id="m-tipo">
              <option value="preventiva">Preventiva</option>
              <option value="corretiva">Corretiva</option>
            </select>
          </div>
          <div class="form-group">
            <label class="flbl">Data</label>
            <input class="finput" id="m-data" type="date">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="flbl" id="lbl-medidor">KM / Horímetro</label>
            <input class="finput" id="m-medidor" type="number" placeholder="0">
          </div>
          <div class="form-group">
            <label class="flbl">Mecânico</label>
            <input class="finput" id="m-mecanico" type="text" placeholder="Nome">
          </div>
        </div>
        <div class="form-group">
          <label class="flbl">Peça(s) Trocada(s)</label>
          <input class="finput" id="m-peca" type="text" placeholder="Ex: Filtro de óleo, pastilha de freio...">
        </div>
        <div class="form-group">
          <label class="flbl">Serviço Realizado</label>
          <textarea class="ftarea" id="m-servico" placeholder="Descreva o serviço..."></textarea>
        </div>
        <div class="form-group">
          <label class="flbl">Custo (R$)</label>
          <input class="finput" id="m-custo" type="number" placeholder="0,00" step="0.01">
        </div>
        <div class="form-group">
          <label class="flbl">Fotos (NF, recibo, peça quebrada...)</label>
          <div id="fotos-manut-preview" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;"></div>
          <label style="display:flex;align-items:center;gap:8px;background:#F8FAFC;border:2px dashed #E2E8F0;border-radius:8px;padding:12px;cursor:pointer;" id="foto-manut-label">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <span style="font-size:12px;color:#64748B;font-weight:600;">Adicionar foto (NF, recibo, peça quebrada...)</span>
            <input type="file" id="foto-manut-inp" accept="image/*" multiple style="display:none;" onchange="previewFotosManut(this)">
          </label>
        </div>
        <button class="btn btn-s" onclick="salvarManut()">&#10003; Registrar Manutenção</button>
      </div>
    </div>
    <div id="manut-historico" style="display:none;">
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input class="search-inp" id="busca-hist" type="text" placeholder="Buscar por máquina, peça, mecânico..." oninput="renderHistorico()">
      </div>
      <div class="card" style="padding:0;overflow:hidden;">
        <div id="hist-list"></div>
      </div>
    </div>
  </div>

  <!-- RELATORIO / ADMIN -->
  <div class="page" id="pg-admin">
    <div class="ptitle">Relatórios</div>
    <div class="stats-grid" id="stats2"></div>
    <div style="font-size:12px;font-weight:700;color:#1E3A6E;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Por Tipo de Máquina</div>
    <div id="rel-tipos"></div>
    <div style="font-size:12px;font-weight:700;color:#1E3A6E;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 8px;">Custo por Máquina</div>
    <div id="rel-custos"></div>
  </div>


</div>

<!-- MODAL MÁQUINA -->
<div class="modal-bg" id="modal-maq">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modal-maq-title">Nova Máquina</div>
      <button class="modal-x" onclick="closeModal('modal-maq')">&times;</button>
    </div>
    <div class="form-group">
      <label class="flbl">Tipo</label>
      <select class="fsel" id="mq-tipo" onchange="atualizarCampoPlaca(this.value)">
        <option value="retroescavadeira">&#9968; Retroescavadeira</option>
        <option value="caminhao">&#128666; Caminhão Caçamba</option>
        <option value="manipuladora">&#127959; Manipuladora</option>
        <option value="camionete">&#128665; Camionete</option>
        <option value="carro">&#128664; Carro de Passeio</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="flbl">Marca</label>
        <input class="finput" id="mq-marca" type="text" placeholder="Ex: JCB">
      </div>
      <div class="form-group">
        <label class="flbl">Modelo</label>
        <input class="finput" id="mq-modelo" type="text" placeholder="Ex: 3CX">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="flbl">Ano</label>
        <input class="finput" id="mq-ano" type="number" placeholder="2020">
      </div>
      <div class="form-group">
        <label class="flbl">Cor</label>
        <input class="finput" id="mq-cor" type="text" placeholder="Amarelo">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="flbl">Placa <span id="placa-na-lbl" style="font-size:9px;color:#94A3B8;display:none;">(N/A para este tipo)</span></label>
        <input class="finput" id="mq-placa" type="text" placeholder="ABC-1234" style="text-transform:uppercase;">
      </div>
      <div class="form-group">
        <label class="flbl">Chassi / Serie</label>
        <input class="finput" id="mq-chassi" type="text" placeholder="9BWZZZ...">
      </div>
    </div>
    <div class="form-group">
      <label class="flbl">Medidor</label>
      <select class="fsel" id="mq-medidor-tipo">
        <option value="km">Quilometragem (KM)</option>
        <option value="horas">Horímetro (Horas)</option>
        <option value="ambos">Ambos (KM + Horas)</option>
      </select>
    </div>
    <div class="form-group">
      <label class="flbl">Medidor Atual</label>
      <input class="finput" id="mq-medidor-atual" type="number" placeholder="0">
    </div>
    <div style="background:#F8FAFC;border-radius:8px;padding:12px;margin-bottom:14px;">
      <div style="font-size:12px;font-weight:700;color:#1E3A6E;margin-bottom:10px;">&#9201; Intervalos de Revisão</div>
      <div class="form-row">
        <div class="form-group">
          <label class="flbl">A cada (dias)</label>
          <input class="finput" id="mq-rev-dias" type="number" placeholder="90">

// Salvar foto como base64 no Realtime Database (gratuito)
function uploadFoto(file, pasta, id, cb) {
  var reader = new FileReader();
  reader.onload = function(e) {
    // Redimensionar imagem para economizar espaco
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement("canvas");
      var MAX = 800;
      var w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      var base64 = canvas.toDataURL("image/jpeg", 0.7);
      var fotoId = pasta + "_" + id + "_" + Date.now();
      // Salvar no Firebase Database
      if (fbDb) {
        fbDb.ref("frota/fotos/" + fotoId).set(base64)
          .then(function(){ cb(fotoId, null); })
          .catch(function(){ cb(base64, null); }); // fallback: retorna base64 direto
      } else {
        cb(base64, null);
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// Recuperar foto pelo ID
function getFotoUrl(idOuBase64, cb) {
  if (!idOuBase64) { cb(""); return; }
  // Se ja e base64 retorna direto
  if (idOuBase64.startsWith("data:")) { cb(idOuBase64); return; }
  // Buscar no Firebase
  if (fbDb) {
    fbDb.ref("frota/fotos/" + idOuBase64).once("value")
      .then(function(s){ cb(s.val() || ""); })
      .catch(function(){ cb(""); });
  } else { cb(""); }
}

  if(!placa||!modelo){toast("Preencha placa e modelo","e");return;}

  var mq={
    id: maqEditId||("mq_"+Date.now()),
    tipo: document.getElementById("mq-tipo").value,
    marca: document.getElementById("mq-marca").value.trim(),
    modelo: modelo,
    ano: document.getElementById("mq-ano").value,
    cor: document.getElementById("mq-cor").value.trim(),
    placa: placa,
    chassi: document.getElementById("mq-chassi").value.trim().toUpperCase(),
    medidorTipo: document.getElementById("mq-medidor-tipo").value,
    medidorAtual: parseFloat(document.getElementById("mq-medidor-atual").value)||0,
    revDias: parseInt(document.getElementById("mq-rev-dias").value)||0,
    revMedidor: parseFloat(document.getElementById("mq-rev-medidor").value)||0,
    ultimaRev: document.getElementById("mq-ultima-rev").value,
    medidorRev: parseFloat(document.getElementById("mq-medidor-rev").value)||0,
    operador: document.getElementById("mq-operador").value.trim(),
    obs: document.getElementById("mq-obs").value.trim(),
    criadoEm: maqEditId?(maqArr.find(function(m){return m.id===maqEditId;})||{}).criadoEm||new Date().toISOString():new Date().toISOString()
  };
  // Upload fotos
  if (fotosMaqPendentes.length > 0) {
    toast("Salvando fotos...", "i");
    uploadFotos(fotosMaqPendentes, "maquinas", mq.id, function(urls) {
      mq.fotos = (mq.fotos || []).concat(urls);
      fotosMaqPendentes = [];
      var prev = document.getElementById("fotos-maq-preview");
      if (prev) prev.innerHTML = "";
      if(maqEditId){
        maqArr=maqArr.map(function(m){return m.id===maqEditId?mq:m;});
      } else {
        maqArr.push(mq);
      }
      saveMaquinas(maqArr);
      closeModal("modal-maq");
      popularSelMaq();
      renderFrota();
      renderDash();
      toast("Maquina salva com " + urls.length + " foto(s)!");
    });
  } else {
    if(maqEditId){
      maqArr=maqArr.map(function(m){return m.id===maqEditId?mq:m;});
    } else {
      maqArr.push(mq);
    }
    saveMaquinas(maqArr);
    closeModal("modal-maq");
    popularSelMaq();
    renderFrota();
    renderDash();
    toast("Maquina salva!");
  }
}

// ── MANUTENCAO ────────────────────────────────────────
function salvarManut(){
  var maqId=document.getElementById("m-maq").value;
  var peca=document.getElementById("m-peca").value.trim();
  var data=document.getElementById("m-data").value;
  if(!maqId){toast("Selecione a máquina","e");return;}
  if(!peca&&!document.getElementById("m-servico").value.trim()){toast("Informe a peça ou serviço","e");return;}
  if(!data){toast("Informe a data","e");return;}

  var manut=getManutencoes();
  var medidor=parseFloat(document.getElementById("m-medidor").value)||0;
  manut.push({
    id:"mt_"+Date.now(),
    maqId:maqId,
    tipo:document.getElementById("m-tipo").value,
    data:data,
    medidor:medidor,
    peca:peca,
    mecanico:document.getElementById("m-mecanico").value.trim(),
    servico:document.getElementById("m-servico").value.trim(),
    custo:parseFloat(document.getElementById("m-custo").value)||0,
    criadoEm:new Date().toISOString()
  });
  // Upload fotos manutencao
  var idManut = "mt_" + Date.now();
  if (fotosManutPendentes.length > 0) {
    toast("Salvando fotos...", "i");
    uploadFotos(fotosManutPendentes, "manutencoes", idManut, function(urls) {
      manut[manut.length-1].fotos = urls;
      fotosManutPendentes = [];
      var prev = document.getElementById("fotos-manut-preview");
      if (prev) prev.innerHTML = "";
      saveManutencoes(manut);
    });
  } else {
    saveManutencoes(manut);
  }

  // atualizar medidor e ultima revisao da maquina
  var maqArr=getMaquinas();
  maqArr=maqArr.map(function(m){
    if(m.id!==maqId) return m;
    var upd=Object.assign({},m);
    if(medidor>m.medidorAtual) upd.medidorAtual=medidor;
    if(document.getElementById("m-tipo").value==="preventiva"){
      upd.ultimaRev=data;
      upd.medidorRev=medidor||m.medidorAtual;
    }
    return upd;
  });
  saveMaquinas(maqArr);

  // limpar form
  document.getElementById("m-maq").value="";
  document.getElementById("m-medidor").value="";
  document.getElementById("m-peca").value="";
  document.getElementById("m-mecanico").value="";
  document.getElementById("m-servico").value="";
  document.getElementById("m-custo").value="";
  document.getElementById("m-data").value=new Date().toISOString().split("T")[0];

  renderDash();
  toast("&#10003; Manutenção registrada!");
}

  var el=document.getElementById("hist-list");

// ── CALCULAR STATUS ───────────────────────────────────
function calcStatus(m){
  var msgs=[];
  var piorCls="ok";
  var piorPct=0;

  // por dias
  if(m.revDias&&m.ultimaRev){
    var diasDesde=Math.floor((new Date()-new Date(m.ultimaRev))/(1000*60*60*24));
    var pct=diasDesde/m.revDias;
    if(pct>=1){msgs.push("Revisão VENCIDA ("+diasDesde+" dias)");piorCls="crit";piorPct=Math.max(piorPct,pct);}
    else if(pct>=0.8){msgs.push("Revisão próxima ("+(m.revDias-diasDesde)+" dias restantes)");if(piorCls!=="crit")piorCls="warn";piorPct=Math.max(piorPct,pct);}
  } else if(m.revDias&&!m.ultimaRev){
    msgs.push("Sem data de revisão cadastrada");if(piorCls==="ok")piorCls="warn";
  }

  // por medidor
  if(m.revMedidor&&m.medidorAtual&&m.medidorRev!==undefined){
    var usado=m.medidorAtual-m.medidorRev;
    var pct2=usado/m.revMedidor;
    if(pct2>=1){msgs.push("Revisão VENCIDA ("+Math.round(usado)+" "+medidorLbl(m)+" desde última rev.)");piorCls="crit";piorPct=Math.max(piorPct,pct2);}
    else if(pct2>=0.8){msgs.push("Revisão próxima ("+(m.revMedidor-usado).toFixed(0)+" "+medidorLbl(m)+" restantes)");if(piorCls!=="crit")piorCls="warn";piorPct=Math.max(piorPct,pct2);}
  }

  return {
    cls:piorCls,
    txt:piorCls==="crit"?"VENCIDO":piorCls==="warn"?"PRÓXIMO":"OK",
    msg:msgs.join(" | ")||"Revisão em dia",
    pct:Math.min(1,piorPct||0)
  };
}

function uploadFotos(arquivos, pasta, id, cb) {
  if (!arquivos || arquivos.length === 0) { cb([]); return; }
  var refs = [];
  var count = 0;
  arquivos.forEach(function(f) {
    uploadFoto(f, pasta, id, function(ref, err) {
      if (ref) refs.push(ref);
      count++;
      if (count === arquivos.length) cb(refs);
    });
  });
}

function verFotos(fotos) {
  if (!fotos || !fotos.length) { toast("Nenhuma foto cadastrada"); return; }
  fotos.forEach(function(ref) {
    getFotoUrl(ref, function(url) {
      if (url) {
        var w = window.open("", "_blank");
        w.document.write("<img src='" + url + "' style='max-width:100%;'>");
      }
    });
  });
}

// ── UTILS ─────────────────────────────────────────────
function medidorLbl(m){
  if(!m) return "KM";
  if(m.medidorTipo==="horas") return "Horas";
  if(m.medidorTipo==="ambos") return "KM/H";
  return "KM";
}

function fmtData(d){
  if(!d) return "—";
  var p=d.split("-");
  if(p.length===3) return p[2]+"/"+p[1]+"/"+p[0];
  return d;
}

function openModal(id){document.getElementById(id).classList.add("on");}
function closeModal(id){document.getElementById(id).classList.remove("on");}

function toast(msg,t){
  var el=document.getElementById("toast");
  el.innerHTML=msg;el.style.background=t==="e"?"#DC2626":"#1E3A6E";
  el.style.display="block";
  clearTimeout(el._t);el._t=setTimeout(function(){el.style.display="none";},2500);
}
